<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Student Records</h2>

        <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">

        <div id="container" class="row g-4"></div>
    </div>

    <script>
        const students = [
            { name: "Akshat", branch: "CSE", cgpa: 8.8, image: "akshat.jpeg" },
            { name: "Rahul", branch: "AI", cgpa: 8.6, image: "kedu.jpeg " },
            { name: "Nimish", branch: "ECE", cgpa: 9.0, image: "nimish.jpeg" }
        ];

        let html = "";

        for (let i = 0; i < students.length; i++) {
            html += `
    <div class="col-md-4">
        <div class="card shadow p-3">
            <img src="${students[i].image}"
            class="card-ing-top rounded-circle mx-auto mb-3"
            style="width:150px; height:200px; object-fit:cover;"
            alt="${students[i].name}">
            <h4>${students[i].name}</h4>

            <button class="btn btn-primary btn-sm mt-2 show-btn">
                Show Details
            </button>

            <div class="details mt-3" style="display:none;">
                <p><strong>Branch:</strong> ${students[i].branch}</p>
                <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
            </div>
        </div>
    </div>`;
        }

        // Add to page
        document.getElementById("container").innerHTML = html;

        // Toggle details (jQuery)
        $(document).on("click", ".show-btn", function () {
            $(this).next(".details").toggle();
        });
    </script>
</body>

</html>
